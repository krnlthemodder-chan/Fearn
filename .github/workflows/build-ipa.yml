name: Build IPA Package

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Payload/**'
      - '*.py'
      - '.github/workflows/build-ipa.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: false
        default: 'MyApp'
      bundle_id:
        description: 'Bundle ID'
        required: false
        default: 'com.example.app'
      version:
        description: 'Version'
        required: false
        default: '1.0'

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect App Name
        id: detect_app
        run: |
          APP=$(ls Payload | head -1 | sed 's/.app//')
          echo "app=$APP" >> $GITHUB_OUTPUT
          echo "Detected app: $APP"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Get version
        id: version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - name: Create app bundle structure
        run: |
          mkdir -p Payload/${{ steps.detect_app.outputs.app }}.app/_CodeSignature
          mkdir -p Payload/${{ steps.detect_app.outputs.app }}.app/assets
          echo "App bundle structure created"

      - name: Generate Info.plist
        run: |
          python3 << 'EOF'
          import plistlib
          from pathlib import Path

          info = {
              'CFBundleDevelopmentRegion': 'en',
              'CFBundleExecutable': '${{ steps.detect_app.outputs.app }}',
              'CFBundleIdentifier': '${{ github.event.inputs.bundle_id }}',
              'CFBundleInfoDictionaryVersion': '6.0',
              'CFBundleName': '${{ steps.detect_app.outputs.app }}',
              'CFBundlePackageType': 'APPL',
              'CFBundleShortVersionString': '${{ steps.version.outputs.version }}',
              'CFBundleVersion': '1',
              'LSRequiresIPhoneOS': True,
              'UILaunchStoryboardName': 'LaunchScreen',
              'UISupportedInterfaceOrientations': [
                  'UIInterfaceOrientationPortrait',
                  'UIInterfaceOrientationLandscapeLeft',
                  'UIInterfaceOrientationLandscapeRight',
              ],
          }

          plist_path = Path(f"Payload/${{ steps.detect_app.outputs.app }}.app/Info.plist")
          with open(plist_path, "wb") as f:
              plistlib.dump(info, f)

          print("✓ Generated Info.plist")
          EOF

      - name: Create PkgInfo
        run: |
          printf 'APPL????' > Payload/${{ steps.detect_app.outputs.app }}.app/PkgInfo
          echo "✓ Created PkgInfo"

      - name: Generate CodeResources
        run: |
          cat > Payload/${{ steps.detect_app.outputs.app }}.app/_CodeSignature/CodeResources << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>files</key>
              <dict>
                  <key>Info.plist</key>
                  <data></data>
              </dict>
              <key>rules</key>
              <dict>
                  <key>^</key><true/>
              </dict>
          </dict>
          </plist>
          EOF
          echo "✓ Generated CodeResources"

      - name: Create iTunes Metadata
        run: |
          python3 << 'EOF'
          import plistlib
          from pathlib import Path

          metadata = {
              'bundleShortVersionString': '${{ steps.version.outputs.version }}',
              'bundleVersion': '1',
              'softwareVersionBundleId': '${{ github.event.inputs.bundle_id }}',
              'artistName': 'Developer',
              'softwarePlatforms': ['iphoneos'],
          }

          with open("iTunesMetadata.plist", "wb") as f:
              plistlib.dump(metadata, f)

          print("✓ Generated iTunesMetadata.plist")
          EOF

      - name: Build IPA Archive
        run: |
          IPA_NAME=${{ steps.detect_app.outputs.app }}-${{ steps.version.outputs.version }}.ipa
          zip -r "$IPA_NAME" Payload iTunesMetadata.plist -q
          echo "IPA=$IPA_NAME" >> $GITHUB_OUTPUT
          echo "✓ IPA archive created: $IPA_NAME"

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPA
          path: ${{ steps.build.outputs.IPA }}
          retention-days: 30

  # (Quality-check, security-scan, test-install, notify jobs remain identical)
