name: Fearn Build Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-fearn:
    name: Build Fearn v3.0.0
    runs-on: macos-latest

    env:
      FEARN_VERSION: "3.0.0"
      ENABLE_REPO_STAGING: "true"
      ENABLE_ADVANCED_SIGNING: "true"
      ENABLE_AI_FEATURES: "true"
      ENABLE_GEODE_INTEGRATION: "true"
      ENABLE_SIDESTORE_SUPPORT: "true"
      MD_APPLE_SDK_ROOT: "/Applications/Xcode_26.6.app"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install dependencies (SwiftLint only)
        run: |
          brew update
          brew install swiftlint

      - name: Build Fearn (Release)
        run: |
          xcodebuild \
            -workspace Fearn.xcworkspace \
            -scheme Fearn \
            -configuration Release \
            -archivePath build/Fearn.xcarchive \
            archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/Fearn.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Fearn-v3.0.0
          path: build/ipa
